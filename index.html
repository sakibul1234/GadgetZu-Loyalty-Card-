<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetZu Loyalty</title>
    <style>
        body { font-family: sans-serif; background: #001f3f; color: white; text-align: center; padding: 20px; }
        .box { background: white; color: black; padding: 20px; border-radius: 15px; max-width: 320px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { color: #001f3f; margin-bottom: 20px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #FF851B; color: white; border: none; padding: 12px; font-weight: bold; width: 93%; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .res { margin-top: 20px; padding: 10px; border-top: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div class="box">
        <h2>GadgetZu Loyalty</h2>
        <input type="text" id="cid" placeholder="Customer ID লিখুন">
        <button onclick="src()">তথ্য দেখুন</button>
        <div id="out" class="res"></div>
    </div>
    <script>
        function src() {
            let id = document.getElementById('cid').value;
            let out = document.getElementById('out');
            if(id) {
                out.innerHTML = "<b>ID:</b> " + id + "<br><b>Balance:</b> 0 TK<br><b>Status:</b> Silver";
            } else { alert("ID লিখুন"); }
        }
    </script>
</body>
</html>
